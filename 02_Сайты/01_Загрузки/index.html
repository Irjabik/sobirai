<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Отчёт по папке «Загрузки»</title>
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --border: #2d3a4d;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #5b9fd4;
      --accent-dim: #3d7aad;
    }
    * { box-sizing: border-box; }
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      margin: 0;
      padding: 1.5rem clamp(1rem, 4vw, 2.5rem) 3rem;
      max-width: 56rem;
      margin-inline: auto;
    }
    h1 { font-size: 1.5rem; font-weight: 600; margin: 0 0 0.5rem; }
    .lead { color: var(--muted); font-size: 0.95rem; margin: 0 0 1.25rem; }
    .privacy { font-size: 0.85rem; color: var(--muted); margin-bottom: 1.25rem; padding: 0.75rem 1rem; background: var(--surface); border-radius: 8px; border: 1px solid var(--border); }
    .toolbar { display: flex; flex-wrap: wrap; gap: 0.75rem; align-items: center; margin-bottom: 1.25rem; }
    button.pick {
      background: var(--accent);
      color: #0a0e12;
      border: none;
      padding: 0.55rem 1.1rem;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
    }
    button.pick:hover { background: var(--accent-dim); color: var(--text); }
    input[type="file"] { position: absolute; width: 0; height: 0; opacity: 0; pointer-events: none; }
    .filter-wrap { flex: 1; min-width: 12rem; }
    .filter-wrap input {
      width: 100%;
      padding: 0.5rem 0.75rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 0.9rem;
    }
    .sort-wrap { display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; color: var(--muted); }
    .sort-wrap select {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.35rem 0.5rem;
      font-size: 0.85rem;
    }
    .tabs { display: flex; gap: 0.25rem; margin-bottom: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
    .tabs button {
      background: transparent;
      border: none;
      color: var(--muted);
      padding: 0.4rem 0.85rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .tabs button[aria-selected="true"] {
      background: var(--surface);
      color: var(--text);
      font-weight: 600;
    }
    .panel[hidden] { display: none; }
    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(10rem, 1fr));
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }
    .summary-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.85rem 1rem;
    }
    .summary-card strong { display: block; font-size: 1.25rem; font-weight: 600; }
    .summary-card span { font-size: 0.8rem; color: var(--muted); }
    .top5-block {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.85rem 1rem 1rem;
      margin-bottom: 1.5rem;
    }
    .top5-title {
      font-size: 0.95rem;
      font-weight: 600;
      margin: 0 0 0.65rem;
      color: var(--text);
    }
    .top5-list {
      margin: 0;
      padding: 0 0 0 1.35rem;
    }
    .top5-list li {
      font-size: 0.8rem;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      color: var(--muted);
      word-break: break-all;
      margin-bottom: 0.4rem;
      padding-right: 0.25rem;
      list-style-position: outside;
    }
    .top5-list li:last-child { margin-bottom: 0; }
    .top5-sz { float: right; margin-left: 0.5rem; color: var(--text); opacity: 0.9; }
    .top5-empty { margin: 0; font-size: 0.85rem; color: var(--muted); }
    details {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 0.5rem;
      overflow: hidden;
    }
    details summary {
      padding: 0.65rem 1rem;
      cursor: pointer;
      font-weight: 600;
      list-style: none;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
    }
    details summary::-webkit-details-marker { display: none; }
    details summary .meta { font-weight: 400; font-size: 0.85rem; color: var(--muted); white-space: nowrap; }
    .file-list {
      margin: 0;
      padding: 0 0 0.75rem;
      max-height: 18rem;
      overflow: auto;
      border-top: 1px solid var(--border);
    }
    .file-list li {
      padding: 0.35rem 1rem 0.35rem 1.25rem;
      font-size: 0.8rem;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      color: var(--muted);
      word-break: break-all;
      list-style: none;
      border-bottom: 1px solid rgba(45, 58, 77, 0.5);
    }
    .file-list li:last-child { border-bottom: none; }
    .file-list .sz { float: right; margin-left: 0.5rem; color: var(--text); opacity: 0.85; }
    .empty-state { color: var(--muted); padding: 2rem; text-align: center; }
  </style>
</head>
<body>
  <h1>Отчёт по содержимому папки</h1>
  <p class="lead">Выберите папку «Загрузки» (или любую другую). Список файлов обрабатывается только в вашем браузере.</p>
  <p class="privacy">Данные никуда не отправляются: страница не загружает внешние скрипты и не обращается к сети.</p>

  <div class="toolbar">
    <button type="button" class="pick" id="btnPick">Выбрать папку</button>
    <input type="file" id="folderInput" webkitdirectory multiple />
    <div class="filter-wrap">
      <input type="search" id="filterInput" placeholder="Фильтр по пути…" autocomplete="off" disabled />
    </div>
    <div class="sort-wrap">
      <label for="sortSelect">Сортировка в списках:</label>
      <select id="sortSelect" disabled>
        <option value="path">по пути</option>
        <option value="size">по размеру</option>
      </select>
    </div>
  </div>

  <div class="tabs" role="tablist" id="tablist" hidden>
    <button type="button" role="tab" id="tabByType" aria-selected="true" aria-controls="panelByType">По типам</button>
    <button type="button" role="tab" id="tabByRoot" aria-selected="false" aria-controls="panelByRoot">По верхним папкам</button>
  </div>

  <div id="panelByType" class="panel" role="tabpanel" aria-labelledby="tabByType"></div>
  <div id="panelByRoot" class="panel" role="tabpanel" aria-labelledby="tabByRoot" hidden></div>

  <p class="empty-placeholder empty-state" id="placeholder">Папка ещё не выбрана. Нажмите «Выбрать папку».</p>

  <script>
(function () {
  'use strict';

  const CATEGORY_ORDER = [
    'Изображения',
    'Видео',
    'Аудио',
    'Документы и текст',
    'Код и данные',
    'Веб-страницы',
    'Архивы',
    'Прочее'
  ];

  const EXT_TO_CAT = (function () {
    const m = new Map();
    function add(exts, cat) {
      exts.forEach(function (e) { m.set(e, cat); });
    }
    add(['jpg', 'jpeg', 'png', 'gif', 'webp', 'svg', 'bmp', 'ico', 'heic'], 'Изображения');
    add(['mp4', 'mov', 'avi', 'mkv', 'webm'], 'Видео');
    add(['mp3', 'wav', 'flac', 'aac', 'm4a', 'ogg'], 'Аудио');
    add(['pdf', 'doc', 'docx', 'xls', 'xlsx', 'ppt', 'pptx', 'odt', 'rtf', 'md', 'txt', 'mdc'], 'Документы и текст');
    add(['js', 'ts', 'jsx', 'tsx', 'json', 'yaml', 'yml', 'xml', 'css', 'scss', 'py', 'go', 'rs', 'java', 'c', 'cpp', 'h', 'vue', 'sh', 'sql', 'toml'], 'Код и данные');
    add(['html', 'htm'], 'Веб-страницы');
    add(['zip', 'rar', '7z', 'tar', 'gz'], 'Архивы');
    return m;
  })();

  function getExtension(fileName) {
    var i = fileName.lastIndexOf('.');
    if (i <= 0 || i === fileName.length - 1) return '';
    return fileName.slice(i + 1).toLowerCase();
  }

  function getCategory(fileName) {
    var ext = getExtension(fileName);
    return EXT_TO_CAT.get(ext) || 'Прочее';
  }

  function formatBytes(n) {
    if (n === 0) return '0 Б';
    var k = 1024;
    var sizes = ['Б', 'КиБ', 'МиБ', 'ГиБ', 'ТиБ'];
    var i = Math.floor(Math.log(n) / Math.log(k));
    i = Math.min(i, sizes.length - 1);
    return (n / Math.pow(k, i)).toFixed(i > 0 ? 1 : 0) + ' ' + sizes[i];
  }

  function topLevelSegment(relativePath) {
    var p = relativePath.replace(/\\/g, '/');
    var idx = p.indexOf('/');
    if (idx === -1) return '(корень)';
    return p.slice(0, idx) || '(корень)';
  }

  var folderInput = document.getElementById('folderInput');
  var btnPick = document.getElementById('btnPick');
  var filterInput = document.getElementById('filterInput');
  var sortSelect = document.getElementById('sortSelect');
  var panelByType = document.getElementById('panelByType');
  var panelByRoot = document.getElementById('panelByRoot');
  var tablist = document.getElementById('tablist');
  var tabByType = document.getElementById('tabByType');
  var tabByRoot = document.getElementById('tabByRoot');
  var placeholder = document.getElementById('placeholder');

  var state = {
    entries: [],
    filter: '',
    sortBy: 'path',
    activeTab: 'type'
  };

  btnPick.addEventListener('click', function () {
    folderInput.click();
  });

  function sortEntries(arr) {
    var copy = arr.slice();
    if (state.sortBy === 'size') {
      copy.sort(function (a, b) {
        if (b.size !== a.size) return b.size - a.size;
        return a.path.localeCompare(b.path, 'ru');
      });
    } else {
      copy.sort(function (a, b) {
        return a.path.localeCompare(b.path, 'ru');
      });
    }
    return copy;
  }

  function matchesFilter(path) {
    if (!state.filter) return true;
    return path.toLowerCase().indexOf(state.filter.toLowerCase()) !== -1;
  }

  function buildFromFileList(fileList) {
    var entries = [];
    for (var i = 0; i < fileList.length; i++) {
      var f = fileList[i];
      var path = f.webkitRelativePath || f.name;
      entries.push({
        path: path,
        name: f.name,
        size: f.size || 0,
        category: getCategory(f.name),
        root: topLevelSegment(path)
      });
    }
    return entries;
  }

  function renderSummary(totalFiles, totalBytes) {
    var wrap = document.createElement('div');
    wrap.className = 'summary';
    function card(label, value, sub) {
      var d = document.createElement('div');
      d.className = 'summary-card';
      d.innerHTML = '<strong>' + value + '</strong><span>' + label + (sub ? ' · ' + sub : '') + '</span>';
      return d;
    }
    wrap.appendChild(card('Файлов', String(totalFiles), ''));
    wrap.appendChild(card('Суммарный размер', formatBytes(totalBytes), ''));
    return wrap;
  }

  function renderTop5Block(filtered) {
    var section = document.createElement('section');
    section.className = 'top5-block';
    section.setAttribute('aria-label', 'Самые крупные файлы');
    var h = document.createElement('h2');
    h.className = 'top5-title';
    h.textContent = 'Топ-5 самых крупных файлов';
    section.appendChild(h);
    if (filtered.length === 0) {
      var empty = document.createElement('p');
      empty.className = 'top5-empty';
      empty.textContent = 'Нет файлов по фильтру.';
      section.appendChild(empty);
      return section;
    }
    var sorted = filtered.slice().sort(function (a, b) {
      if (b.size !== a.size) return b.size - a.size;
      return a.path.localeCompare(b.path, 'ru');
    });
    var top = sorted.slice(0, 5);
    var ol = document.createElement('ol');
    ol.className = 'top5-list';
    for (var i = 0; i < top.length; i++) {
      var li = document.createElement('li');
      li.innerHTML = '<span class="top5-sz">' + formatBytes(top[i].size) + '</span>' + escapeHtml(top[i].path);
      ol.appendChild(li);
    }
    section.appendChild(ol);
    return section;
  }

  function renderDetailsList(title, metaText, items) {
    var det = document.createElement('details');
    det.open = items.length <= 8;
    var sum = document.createElement('summary');
    sum.innerHTML = '<span>' + title + '</span><span class="meta">' + metaText + '</span>';
    det.appendChild(sum);
    if (items.length === 0) {
      var empty = document.createElement('p');
      empty.className = 'empty-state';
      empty.style.padding = '0.75rem 1rem';
      empty.style.margin = '0';
      empty.textContent = 'Нет файлов по фильтру.';
      det.appendChild(empty);
      return det;
    }
    var ul = document.createElement('ul');
    ul.className = 'file-list';
    for (var j = 0; j < items.length; j++) {
      var e = items[j];
      var li = document.createElement('li');
      li.innerHTML = '<span class="sz">' + formatBytes(e.size) + '</span>' + escapeHtml(e.path);
      ul.appendChild(li);
    }
    det.appendChild(ul);
    return det;
  }

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function renderByType() {
    panelByType.innerHTML = '';
    var filtered = state.entries.filter(function (e) { return matchesFilter(e.path); });
    var totalBytes = filtered.reduce(function (a, e) { return a + e.size; }, 0);
    panelByType.appendChild(renderSummary(filtered.length, totalBytes));
    panelByType.appendChild(renderTop5Block(filtered));

    var byCat = new Map();
    CATEGORY_ORDER.forEach(function (c) { byCat.set(c, []); });
    for (var i = 0; i < filtered.length; i++) {
      var e = filtered[i];
      if (!byCat.has(e.category)) byCat.set(e.category, []);
      byCat.get(e.category).push(e);
    }

    CATEGORY_ORDER.forEach(function (cat) {
      var list = sortEntries(byCat.get(cat) || []);
      var bytes = list.reduce(function (a, x) { return a + x.size; }, 0);
      var meta = list.length + ' шт. · ' + formatBytes(bytes);
      panelByType.appendChild(renderDetailsList(cat, meta, list));
    });
  }

  function renderByRoot() {
    panelByRoot.innerHTML = '';
    var filtered = state.entries.filter(function (e) { return matchesFilter(e.path); });
    var totalBytes = filtered.reduce(function (a, e) { return a + e.size; }, 0);
    panelByRoot.appendChild(renderSummary(filtered.length, totalBytes));
    panelByRoot.appendChild(renderTop5Block(filtered));

    var byRoot = new Map();
    for (var i = 0; i < filtered.length; i++) {
      var e = filtered[i];
      if (!byRoot.has(e.root)) byRoot.set(e.root, []);
      byRoot.get(e.root).push(e);
    }
    var roots = Array.from(byRoot.keys()).sort(function (a, b) {
      return a.localeCompare(b, 'ru');
    });
    for (var r = 0; r < roots.length; r++) {
      var root = roots[r];
      var list = sortEntries(byRoot.get(root));
      var bytes = list.reduce(function (a, x) { return a + x.size; }, 0);
      var meta = list.length + ' шт. · ' + formatBytes(bytes);
      panelByRoot.appendChild(renderDetailsList(root, meta, list));
    }
  }

  function refresh() {
    if (state.entries.length === 0) return;
    renderByType();
    renderByRoot();
  }

  folderInput.addEventListener('change', function () {
    var files = folderInput.files;
    if (!files || files.length === 0) return;
    state.entries = buildFromFileList(files);
    placeholder.hidden = true;
    filterInput.disabled = false;
    sortSelect.disabled = false;
    tablist.hidden = false;
    state.activeTab = 'type';
    tabByType.setAttribute('aria-selected', 'true');
    tabByRoot.setAttribute('aria-selected', 'false');
    panelByType.hidden = false;
    panelByRoot.hidden = true;
    refresh();
    folderInput.value = '';
  });

  filterInput.addEventListener('input', function () {
    state.filter = filterInput.value.trim();
    refresh();
  });

  sortSelect.addEventListener('change', function () {
    state.sortBy = sortSelect.value;
    refresh();
  });

  function setTab(which) {
    state.activeTab = which;
    var isType = which === 'type';
    tabByType.setAttribute('aria-selected', isType ? 'true' : 'false');
    tabByRoot.setAttribute('aria-selected', isType ? 'false' : 'true');
    panelByType.hidden = !isType;
    panelByRoot.hidden = isType;
  }

  tabByType.addEventListener('click', function () { setTab('type'); });
  tabByRoot.addEventListener('click', function () { setTab('root'); });
})();
  </script>
</body>
</html>
