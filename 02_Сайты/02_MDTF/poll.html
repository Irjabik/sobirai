<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#072636">
  <title>Опрос: MBDTF | MDTF</title>
  <meta name="description" content="Один вопрос: послушаете ли My Beautiful Dark Twisted Fantasy после просмотра этого сайта.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="site.css">
</head>
<body>
  <div class="wrap">
    <header class="site-header">
      <a class="site-logo" href="index.html">MDTF</a>
      <nav class="site-nav" aria-label="Разделы сайта">
        <ul>
          <li><a href="index.html">Альбом</a></li>
          <li><a href="tour.html">Тур 2010</a></li>
          <li><a href="poll.html" aria-current="page">Опрос</a></li>
        </ul>
      </nav>
    </header>

    <div class="poll-card reveal-up" style="--reveal-delay:0s">
      <h1>Опрос</h1>

      <form id="poll-form" action="#" method="get">
        <fieldset class="poll-fieldset">
          <legend class="poll-legend">Послушаете ли вы MDTF после просмотра этого сайта?</legend>
          <ul class="poll-options">
            <li><label><input type="radio" name="listen" value="yes" required> Да</label></li>
            <li><label><input type="radio" name="listen" value="no"> Нет</label></li>
          </ul>
        </fieldset>

        <div class="poll-actions">
          <button type="submit" class="poll-submit">Ответить</button>
          <a href="index.html">Вернуться к альбому</a>
        </div>
      </form>

      <p id="poll-result" class="poll-result" role="status" aria-live="polite"></p>
    </div>

    <footer class="reveal-up" style="--reveal-delay:0.1s">
      <p>MDTF / MBDTF — фан-страница. Музыка и товарные знаки принадлежат правообладателям.</p>
    </footer>
  </div>
  <script src="site-anim.js" defer></script>
</body>
</html>
